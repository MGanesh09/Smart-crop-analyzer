services:
  - type: web
    name: smart-crop-api
    env: docker
    plan: free
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false # This will prompt the user to paste their MongoDB Atlas Connection URI
